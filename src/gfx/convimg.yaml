palettes:
  - name: global_palette
    max-entries: 256
    fixed-entries:
      - color: { index: 0, r: 255, g: 0, b: 128 } # transparent
      - color: { index: 1, r: 128, g: 128, b: 128 }
      - color: { index: 2, r: 0, g: 0, b: 0} # black
      - color: { index: 3, r: 255, g: 255, b: 255}
      - color: { index: 4, r: 255, g: 0, b: 0}
      - color: { index: 5, r: 0, g: 255, b: 0}
      - color: { index: 6, r: 64, g: 178, b: 255}
      - color: { index: 7, r: 255, g: 255, b: 0}
    images: automatic
